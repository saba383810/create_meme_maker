<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>クソミーム・メーカー</title>
<meta name="description" content="画像にテキストを乗せるだけ。スマホでもPCでもサクッと作れるミーム画像メーカー">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect x=%221%22 y=%222%22 width=%2222%22 height=%2220%22 rx=%224%22 fill=%22%236366f1%22/><path d=%22M6 15l3.5-4 2.5 3 2-2.5L18 15%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/><circle cx=%228.5%22 cy=%228.5%22 r=%221.5%22 fill=%22white%22/></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body data-mode="pick">
<header>
  <h1 class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="2" y="3" width="20" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
      <path d="M6 15l3.5-4 2.5 3 2-2.5L18 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
    </svg>
    <span>クソミーム・メーカー</span>
  </h1>
  <nav class="steps" aria-label="手順">
    <button type="button" class="step" id="stepPick"><span class="step-num">1</span>えらぶ</button>
    <span class="step-arrow" aria-hidden="true">▸</span>
    <button type="button" class="step" id="stepEdit" disabled><span class="step-num">2</span>つくる</button>
    <span class="step-arrow" aria-hidden="true">▸</span>
    <button type="button" class="step" id="stepDone" disabled><span class="step-num">3</span>できた</button>
  </nav>
</header>

<main>
  <!-- ① えらぶ: テンプレート選択 -->
  <section class="screen" id="pickScreen">
    <div class="pick-inner">
      <label class="add-card" for="fileInput">
        <span class="add-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.4 16.6A5 5 0 0 0 18 7.1 8 8 0 1 0 3.1 15.2"/>
            <path d="M12 12v9"/>
            <path d="M8.5 15.5L12 12l3.5 3.5"/>
          </svg>
        </span>
        <span class="add-title">画像からつくる</span>
        <span class="add-sub">ドラッグ&amp;ドロップ・<kbd>Ctrl</kbd>+<kbd>V</kbd> でも追加できます</span>
      </label>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>

      <h2 class="pick-head" id="mineHead" hidden>マイテンプレート</h2>
      <div class="card-grid" id="templateGrid"></div>

      <h2 class="pick-head" id="presetHead" hidden>プリセット</h2>
      <div class="card-grid" id="presetGrid"></div>
    </div>
  </section>

  <!-- ② つくる: キャンバス + ボトムエディタ -->
  <section class="screen" id="editScreen" hidden>
    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div class="hint-bubble" id="editHint" hidden>なにもない所をドラッグして枠を追加／二本指で拡大</div>
      <button type="button" class="view-reset" id="btnResetView" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3H5a2 2 0 0 0-2 2v4M15 3h4a2 2 0 0 1 2 2v4M9 21H5a2 2 0 0 1-2-2v-4M15 21h4a2 2 0 0 0 2-2v-4"/></svg>
        全体表示
      </button>
    </div>
    <div id="editor"></div>
  </section>

  <!-- ③ できた: プレビューと保存 -->
  <section class="screen" id="doneScreen" hidden>
    <div class="done-inner">
      <img id="resultImg" alt="できあがったミーム画像">
      <p class="done-note">画像を長押しすると写真に保存できます</p>
      <div class="done-actions">
        <button type="button" class="btn primary" id="btnShare" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v13M8 6.5 12 3l4 3.5"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>
          共有
        </button>
        <button type="button" class="btn primary" id="btnSave">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          PNG保存
        </button>
        <button type="button" class="btn" id="btnCopy">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          コピー
        </button>
        <button type="button" class="btn ghost" id="btnBack">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
          直す
        </button>
      </div>
    </div>
  </section>
</main>

<div id="dropOverlay" hidden><span>ここにドロップ！</span></div>
<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
